name: Build macOS App

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    env:
      SOURCE_PACKAGES_DIR: build/SourcePackages
      SPARKLE_BIN_DIR: build/SourcePackages/artifacts/sparkle/Sparkle/bin

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift package dependencies
        run: >
          xcodebuild
          -resolvePackageDependencies
          -project Clipbook.xcodeproj
          -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR"

      - name: Build unsigned app
        run: >
          xcodebuild
          -project Clipbook.xcodeproj
          -scheme Clipbook
          -configuration Release
          -derivedDataPath build
          -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR"
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Ad-hoc sign app bundle
        run: >
          codesign
          --force
          --deep
          --sign -
          build/Build/Products/Release/Clipbook.app

      - name: Package app artifact
        run: >
          ditto -c -k --sequesterRsrc --keepParent
          build/Build/Products/Release/Clipbook.app
          Clipbook-${{ github.ref_name }}-unsigned.app.zip

      - name: Validate Sparkle signing secret
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "SPARKLE_PRIVATE_KEY secret is not configured" >&2
            exit 1
          fi

      - name: Sign app artifact for Sparkle
        id: sparkle
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          ASSET_NAME="Clipbook-${{ github.ref_name }}-unsigned.app.zip"
          SIGNATURE=$(printf '%s' "$SPARKLE_PRIVATE_KEY" | "$SPARKLE_BIN_DIR/sign_update" --ed-key-file - -p "$ASSET_NAME")
          echo "sparkle_signature=$SIGNATURE" >> "$GITHUB_OUTPUT"

      - name: Read build metadata
        id: metadata
        run: |
          INFO_PLIST="build/Build/Products/Release/Clipbook.app/Contents/Info.plist"
          echo "short_version=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$INFO_PLIST")" >> "$GITHUB_OUTPUT"
          echo "build_version=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$INFO_PLIST")" >> "$GITHUB_OUTPUT"
          echo "minimum_system_version=$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' "$INFO_PLIST")" >> "$GITHUB_OUTPUT"
          echo "asset_size=$(stat -f%z "Clipbook-${{ github.ref_name }}-unsigned.app.zip")" >> "$GITHUB_OUTPUT"
          if [ -n "${{ steps.sparkle.outputs.sparkle_signature }}" ]; then
            echo "sparkle_signature=${{ steps.sparkle.outputs.sparkle_signature }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload app artifact
        uses: actions/upload-artifact@v6
        with:
          name: Clipbook-${{ github.ref_name }}-unsigned-macos-app
          path: Clipbook-${{ github.ref_name }}-unsigned.app.zip
          retention-days: 7

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          ASSET_NAME: Clipbook-${{ github.ref_name }}-unsigned.app.zip
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ASSET_NAME" --clobber
          else
            gh release create "$TAG_NAME" "$ASSET_NAME" \
              --title "$TAG_NAME" \
              --generate-notes
          fi

      - name: Update appcast on master
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG_NAME: ${{ github.ref_name }}
          SHORT_VERSION: ${{ steps.metadata.outputs.short_version }}
          BUILD_VERSION: ${{ steps.metadata.outputs.build_version }}
          MINIMUM_SYSTEM_VERSION: ${{ steps.metadata.outputs.minimum_system_version }}
          ASSET_SIZE: ${{ steps.metadata.outputs.asset_size }}
          SPARKLE_SIGNATURE: ${{ steps.metadata.outputs.sparkle_signature }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          git fetch origin master
          git checkout master

          cat > appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Clipbook</title>
              <link>https://raw.githubusercontent.com/xcy960815/Clipbook/master/appcast.xml</link>
              <description>Most recent changes with links to updates.</description>
              <language>en</language>
              <item>
                <title>${SHORT_VERSION}</title>
                <description><![CDATA[<p>See the release notes for details.</p>]]></description>
                <pubDate>$(date -u '+%a, %d %b %Y %H:%M:%S GMT')</pubDate>
                <releaseNotesLink>https://github.com/xcy960815/Clipbook/releases/tag/${TAG_NAME}</releaseNotesLink>
                <sparkle:minimumSystemVersion>${MINIMUM_SYSTEM_VERSION}</sparkle:minimumSystemVersion>
                <enclosure
                  url="https://github.com/xcy960815/Clipbook/releases/download/${TAG_NAME}/Clipbook-${TAG_NAME}-unsigned.app.zip"
                  sparkle:version="${BUILD_VERSION}"
                  sparkle:shortVersionString="${SHORT_VERSION}"
                  sparkle:edSignature="${SPARKLE_SIGNATURE}"
                  length="${ASSET_SIZE}"
                  type="application/octet-stream"
                />
              </item>
            </channel>
          </rss>
          EOF

          printf '%s' "$SPARKLE_PRIVATE_KEY" | "$SPARKLE_BIN_DIR/sign_update" --ed-key-file - appcast.xml

          if git diff --quiet -- appcast.xml; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Update appcast for ${TAG_NAME}"
          git push origin master
